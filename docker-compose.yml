services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qs-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: ${VITE_API_URL}
    depends_on:
      - backend
    networks:
      - fe_be_net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qs-backend
    ports:
      - "8080:8080"
    environment:
      PORT: ${PORT}
      JWT_SECRET: ${JWT_SECRET}
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      - db
    networks:
      - fe_be_net
      - be_db_net
    restart: unless-stopped

  db:
    image: postgres:18
    container_name: qs-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - be_db_net
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  fe_be_net:
    driver: bridge
  be_db_net:
    driver: bridge